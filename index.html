<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Momo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🎮 Momo</h1>

<input id="pseudo" placeholder="Pseudo">

<button onclick="createRoom()">Créer une room</button>

<input id="code" placeholder="Code room" inputmode="numeric" pattern="[0-9]*">

<button onclick="joinRoom()">Rejoindre</button>

<button onclick="startQRScan()">Scanner QR Code</button>

<video id="camera" style="display:none;"></video>

<div id="error"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
